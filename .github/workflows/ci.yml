name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # The CLI has zero runtime deps, so just exercise the entry points.
      - name: CLI help
        run: node bin/davidtech-updater.js --help
      - name: Generate slug
        run: node bin/davidtech-updater.js slug
